[package]
name = "easy-media-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = {version = "1.0.102",default-features = false, features = ["std"]}
clap = { version = "4.6.1", default-features = false, features = ["derive","std","help","usage","error-context","suggestions"] }
crossterm = { version = "0.29.0", default-features = false, features = ["windows"] }

[profile.release]
opt-level = 2
strip = true
overflow-checks = false
lto = true
panic = "abort"
