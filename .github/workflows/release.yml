name: Release

# 当推送一个形如 'v*' 的 tag 时触发，例如 v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and Release
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # 工具基础名称（如需改名，请同时修改下面 matrix 中的 artifact_name 和 binary_name）
      # 参考平台支持：https://doc.rust-lang.org/nightly/rustc/platform-support.html#tier-1-with-host-tools
      matrix:
        include:
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: easy-media-cli-windows-x86_64.exe
            binary_name: easy-media-cli.exe
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: easy-media-cli-macos-x86_64
            binary_name: easy-media-cli
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: easy-media-cli-macos-aarch64
            binary_name: easy-media-cli
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: easy-media-cli-linux-x86_64
            binary_name: easy-media-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # 需要完整历史以检查 tag 所在分支

      - name: Check if tag is on master branch
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Checking if tag $TAG_NAME is on master branch..."
          # 获取 tag 指向的 commit hash
          TAG_COMMIT=$(git rev-parse "$TAG_NAME^{commit}")
          # 获取 master 分支最新 commit
          MASTER_COMMIT=$(git rev-parse origin/master)
          # 检查 tag commit 是否是 master 分支的祖先（即 master 包含该 commit）
          if git merge-base --is-ancestor "$TAG_COMMIT" "$MASTER_COMMIT"; then
            echo "Tag is on master branch."
          else
            echo "Tag is NOT on master branch. Release aborted."
            exit 1
          fi

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          compression-level: 0

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          args: -c github --latest --strip header # 只生成最新 tag 的变更，去掉默认标题
        env:
          OUTPUT: CHANGELOG.md # 生成的文件名
          GITHUB_REPO: ${{ github.repository }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # 下载到 artifacts/ 目录，每个 artifact 以其名称创建子目录
          path: artifacts

      # 将下载的各个二进制文件整理到一个扁平目录，并重命名为平台标识
      - name: Flatten and rename binaries
        run: |
          mkdir -p dist
          # 遍历 artifacts 下的所有子目录
          for dir in artifacts/*/; do
            # 去除末尾斜杠，获取目录名（即 artifact_name）
            dirname=$(basename "$dir")
            # 查找该目录下的第一个普通文件（通常只有一个）
            file=$(find "$dir" -type f -print -quit)
            if [ -n "$file" ]; then
              # 复制文件到 dist，并以目录名作为新文件名
              cp "$file" "dist/$dirname"
            else
              echo "Warning: No file found in $dir" >&2
            fi
          done
          # 列出 dist 内容供调试
          ls -l dist

      # 恢复可执行权限（对于 Linux/macOS 二进制文件）
      - name: Set executable permissions
        run: |
          chmod +x artifacts/*/easy-media-cli || true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
